spring:
  application:
    name: tutoring-backend
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:testdb;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;NON_KEYWORDS=USER
    username: sa
    password:
  h2:
    console:
      enabled: false
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
  sql:
    init:
      mode: always
      schema-locations: classpath:schema-test.sql

llm:
  api-key: ${LLM_API_KEY:test-api-key}
  model: qwen-max
  timeout: 30000
  retry: 3

file:
  upload-dir: ./test-uploads
  max-file-size: 10485760
  allowed-image-types: jpg,jpeg,png,gif,webp,bmp

logging:
  level:
    com.tutoring: debug
    org.springframework.security: info
