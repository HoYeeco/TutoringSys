version: '3.8'
services:
  mysql:
    image: mysql:8.0
    container_name: tutoringsys-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: tutoringsys_db
    volumes:
      - ./mysql-data:/var/lib/mysql
      - ./sql/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    ports:
      - "3306:3306"
    networks:
      - tutoringsys-net

  redis:
    image: redis:7.0
    container_name: tutoringsys-redis
    restart: always
    ports:
      - "6379:6379"
    networks:
      - tutoringsys-net

  backend:
    build: ./backend
    container_name: tutoringsys-backend
    restart: on-failure:3
    depends_on:
      - mysql
      - redis
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/tutoringsys_db?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: 123456
      SPRING_REDIS_HOST: redis
      JWT_SECRET: ${JWT_SECRET:-your-256-bit-secret}   # 从环境变量读取
    ports:
      - "8080:8080"
    networks:
      - tutoringsys-net

  frontend:
    image: nginx:alpine
    container_name: tutoringsys-frontend
    restart: always
    volumes:
      - ./frontend/dist:/usr/share/nginx/html
      - ./nginx.conf:/etc/nginx/nginx.conf
    ports:
      - "80:80"
    networks:
      - tutoringsys-net

networks:
  tutoringsys-net:
    driver: bridge
